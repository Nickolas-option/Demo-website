<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FAIR-J Demo</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <p class="eyebrow">FAIR-J Report Viewer</p>
      <h1>Open a report from the list and view it inline.</h1>
      <p class="hero-text">
        FAIR-J tests whether small rubric edits change LLM-as-a-judge scores and rankings.
      </p>
    </header>

    <main class="layout">
      <section class="catalog-panel">
        <div class="section-heading">
          <h2>Reports</h2>
          <p>Select a run.</p>
        </div>
        <div id="report-list" class="report-list" aria-live="polite"></div>
      </section>

      <section class="viewer-panel">
        <div class="viewer-topbar">
          <div>
            <h2 id="selected-title">Loading reports...</h2>
            <p id="selected-subtitle" class="selected-subtitle"></p>
          </div>
          <div class="viewer-actions">
            <a id="open-report-link" class="action-button action-button-primary" href="#" target="_blank" rel="noreferrer">Open Full Report</a>
          </div>
        </div>

        <div class="meta-strip">
          <span id="meta-dataset" class="meta-pill">-</span>
          <span id="meta-scale" class="meta-pill">-</span>
          <span id="meta-setup" class="meta-pill">-</span>
          <span id="meta-examples" class="meta-pill">-</span>
        </div>

        <div class="iframe-shell">
          <iframe id="report-frame" title="FAIR-J report preview" loading="lazy"></iframe>
        </div>
      </section>
    </main>
  </div>

  <script src="assets/app.js"></script>
</body>
</html>
