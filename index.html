<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FAIR-J Demo</title>
  <link rel="stylesheet" href="assets/styles.css?v=3">
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <h1>FAIR-J Report Viewer</h1>
      <p class="hero-text">
        This website is only for browsing the results reported in the paper. For the FAIR-J tool and usage instructions, see the
        <a href="https://anonymous.4open.science/r/FAIR-J-Demo-repo/README.md" target="_blank" rel="noreferrer">anonymized repository</a>.
      </p>
    </header>

    <main class="layout">
      <section class="catalog-panel">
        <div class="section-heading">
          <h2>Reports</h2>
        </div>
        <div id="report-list" class="report-list" aria-live="polite"></div>
      </section>

      <section class="viewer-panel">
        <div class="viewer-topbar">
          <div>
            <h2 id="selected-title">Loading reports...</h2>
            <p id="selected-subtitle" class="selected-subtitle"></p>
          </div>
          <div class="viewer-actions">
            <a id="open-report-link" class="action-button action-button-primary" href="#" target="_blank" rel="noreferrer">Open Full Report</a>
          </div>
        </div>

        <div class="iframe-shell">
          <iframe id="report-frame" title="FAIR-J report preview" loading="lazy"></iframe>
        </div>
      </section>
    </main>
  </div>

  <script src="assets/app.js?v=3"></script>
</body>
</html>
